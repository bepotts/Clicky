disabled_rules:
  - trailing_whitespace

opt_in_rules:
  - empty_count
  - empty_string
  - explicit_init
  - force_unwrapping
  - implicit_return
  - redundant_nil_coalescing
  - sorted_imports

excluded:
  - .build
  - Pods
  - DerivedData

line_length:
  warning: 120
  error: 150
  ignores_comments: true

identifier_name:
  min_length:
    warning: 1
  excluded:
    - id
    - x
    - y
    - z

function_body_length:
  warning: 50
  error: 100

type_body_length:
  warning: 300
  error: 400

file_length:
  warning: 500
  error: 1000
