name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --strict --no-cache

  format:
    name: SwiftFormat
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install SwiftFormat
        run: brew install swiftformat

      - name: Check formatting
        run: swiftformat --lint . --cache ignore

  test:
    name: Tests
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.5.0.app

      - name: Prepare Firebase configuration
        run: |
          if [ ! -f GoogleService-Info.plist ]; then
            cp GoogleService-Info.template.plist GoogleService-Info.plist
          fi

      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies -project Increment.xcodeproj -scheme Increment

      - name: Run tests
        run: |
          xcodebuild test \
            -project Increment.xcodeproj \
            -scheme Increment \
            -destination 'platform=iOS Simulator,name=iPhone 17,OS=latest' \
            -enableCodeCoverage YES
