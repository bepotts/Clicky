name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SWIFTLINT_VERSION: 0.63.2
  SWIFTFORMAT_VERSION: 0.61.1
  XCODE_APP_VERSION: 26.5.0
  XCODE_VERSION: "26.5"

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: |
          brew install mint
          mint install realm/SwiftLint@${SWIFTLINT_VERSION}
          echo "$HOME/.mint/bin" >> "$GITHUB_PATH"

      - name: Print tool versions
        run: |
          brew --version
          mint version
          swiftlint version
          test "$(swiftlint version)" = "${SWIFTLINT_VERSION}"

      - name: Run SwiftLint
        run: swiftlint lint --strict --no-cache

  format:
    name: SwiftFormat
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install SwiftFormat
        run: |
          brew install mint
          mint install nicklockwood/SwiftFormat@${SWIFTFORMAT_VERSION}
          echo "$HOME/.mint/bin" >> "$GITHUB_PATH"

      - name: Print tool versions
        run: |
          brew --version
          mint version
          swiftformat --version
          test "$(swiftformat --version)" = "${SWIFTFORMAT_VERSION}"

      - name: Check formatting
        run: swiftformat --lint . --cache ignore

  test:
    name: Tests
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_${XCODE_APP_VERSION}.app

      - name: Print tool versions
        run: |
          xcodebuild -version
          xcode-select --print-path
          swift --version
          xcodebuild -version | grep -qx "Xcode ${XCODE_VERSION}"

      - name: Prepare Firebase configuration
        run: |
          if [ ! -f GoogleService-Info.plist ]; then
            cp GoogleService-Info.template.plist GoogleService-Info.plist
          fi

      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies -project Increment.xcodeproj -scheme Increment

      - name: Run tests
        run: |
          xcodebuild test \
            -project Increment.xcodeproj \
            -scheme Increment \
            -destination 'platform=iOS Simulator,name=iPhone 17,OS=latest' \
            -enableCodeCoverage YES
